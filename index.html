<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eat-chain</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
min-height: 100vh;
background: #1a1a1a;
background-image: radial-gradient(ellipse at 50% 50%, #2a2a2a 0%, #111 100%);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
font-family: ‘Noto Serif TC’, serif;
padding: 16px;
overflow-x: auto;
overflow-y: auto;
}

.captures-row {
display: flex;
flex-wrap: wrap;
gap: 4px;
justify-content: center;
align-items: center;
min-height: 40px;
padding: 4px 8px;
}

.cap-piece {
width: 32px; height: 32px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 13px; font-weight: 900;
}
.cap-piece.red {
background: #f5e8dc;
border: 2px solid #c0392b;
color: #c0392b;
box-shadow: 0 2px 5px rgba(0,0,0,0.4);
}
.cap-piece.black {
background: #1a1a1a;
border: 2px solid #555;
color: #e8e8e8;
box-shadow: 0 2px 5px rgba(0,0,0,0.5);
}

.board-wrap {
margin: 8px 0;
background: linear-gradient(135deg, #888, #666);
padding: 10px;
border-radius: 4px;
box-shadow: 0 0 0 2px #999, 0 8px 30px rgba(0,0,0,0.7);
}

table {
border-collapse: collapse;
background: #e8e8e8;
border: 2px solid #666;
}

td {
width: 62px; height: 62px;
border: 1px solid rgba(80,80,80,0.3);
text-align: center; vertical-align: middle;
cursor: pointer; position: relative;
background: #e8e8e8;
}

.piece {
width: 52px; height: 52px; margin: auto; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 22px; font-weight: 900;
user-select: none;
position: relative;
}

.piece.red {
background: #f5e8dc;
border: 4px solid #c0392b;
color: #c0392b;
box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
}
.piece.red::after {
content: ‘’; position: absolute; inset: 5px; border-radius: 50%;
border: 1px solid rgba(192,57,43,0.25);
}

.piece.black {
background: #1a1a1a;
border: 4px solid #555;
color: #e8e8e8;
box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
}

.piece.back {
background: #5a4a3a;
border: 4px solid #888;
box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
}

.piece.empty { background: none; border: none; box-shadow: none; }

td.selected .piece.red   { border-color: #ff6060; }
td.selected .piece.black { border-color: #aaaaaa; }
td.selected .piece.back  { border-color: #bbbbbb; }

@keyframes revealPop {
0%   { transform: scale(0.5) rotate(-15deg); opacity: 0.3; }
55%  { transform: scale(1.15) rotate(3deg); opacity: 1; }
100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes retreatShake {
0%   { transform: translateX(0); }
25%  { transform: translateX(-5px); }
50%  { transform: translateX(5px); }
75%  { transform: translateX(-3px); }
100% { transform: translateX(0); }
}
.reveal-pop    { animation: revealPop 0.45s ease-out forwards; }
.retreat-shake { animation: retreatShake 0.35s ease-out; }

.bottom { margin-top: 10px; }
button {
padding: 7px 26px;
font-family: ‘Noto Serif TC’, serif;
font-size: 14px; font-weight: 700; letter-spacing: 3px;
color: #c8902a; background: transparent;
border: 1px solid rgba(200,144,42,0.45);
border-radius: 3px; cursor: pointer;
transition: all 0.2s;
}
button:hover { background: rgba(200,144,42,0.1); border-color: #c8902a; }

#winOverlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,0.8);
align-items: center; justify-content: center;
flex-direction: column; gap: 20px; z-index: 200;
}
#winOverlay.show { display: flex; }
#winText { font-size: 46px; font-weight: 900; letter-spacing: 8px; text-shadow: 0 0 24px currentColor; }
#winOverlay button { font-size: 16px; padding: 10px 36px; }
</style>

</head>
<body>

<div class="captures-row" id="blackCaptures"></div>

<div class="board-wrap">
  <table id="board"></table>
</div>

<div class="captures-row" id="redCaptures"></div>

<div class="bottom">
  <button onclick="initGame()">重新開始</button>
</div>

<div id="winOverlay">
  <div id="winText"></div>
  <button onclick="initGame()">再來一局</button>
</div>

<script>
const W=8, H=4;
const rankMap = {
  "帥":6,"將":6,
  "仕":5,"士":5,
  "相":4,"象":4,
  "俥":3,"車":3,
  "傌":2,"馬":2,
  "兵":1,"卒":1,
  "炮":0,"砲":0
};

const redTypes   = ["帥","仕","仕","相","相","傌","傌","俥","俥","炮","炮","兵","兵","兵","兵","兵"];
const blackTypes = ["將","士","士","象","象","馬","馬","車","車","砲","砲","卒","卒","卒","卒","卒"];

let board=[], selected=null, mustContinue=false, animating=false;
let redCaptures=[], blackCaptures=[];

function initGame(){
  board=[]; selected=null; mustContinue=false; animating=false;
  redCaptures=[]; blackCaptures=[];
  let pieces=[
    ...redTypes.map(t=>({side:"R",type:t,revealed:false})),
    ...blackTypes.map(t=>({side:"B",type:t,revealed:false}))
  ].sort(()=>Math.random()-0.5);
  let idx=0;
  for(let y=0;y<H;y++){ board[y]=[]; for(let x=0;x<W;x++) board[y][x]=pieces[idx++]; }
  document.getElementById("winOverlay").classList.remove("show");
  draw();
}

function draw(){
  let html="";
  for(let y=0;y<H;y++){
    html+="<tr>";
    for(let x=0;x<W;x++){
      let p=board[y][x], text="", cls="piece";
      if(p){
        if(p.revealed){ text=p.type; cls+=" "+(p.side==="R"?"red":"black"); }
        else cls+=" back";
      } else cls+=" empty";
      let isSel=selected&&selected.x===x&&selected.y===y;
      html+=`<td onclick="clickCell(${x},${y})" class="${isSel?"selected":""}">
        <div class="${cls}" id="c${x}_${y}">${text}</div></td>`;
    }
    html+="</tr>";
  }
  document.getElementById("board").innerHTML=html;
  renderCaptures("redCaptures", redCaptures, "red");
  renderCaptures("blackCaptures", blackCaptures, "black");
}

function renderCaptures(id, list, side){
  let sorted=[...list].sort((a,b)=>rankMap[b.type]-rankMap[a.type]);
  document.getElementById(id).innerHTML=sorted.map(p=>
    `<div class="cap-piece ${side}">${p.type}</div>`
  ).join('');
}

function clickCell(x,y){
  if(animating) return;
  let cell=board[y][x];

  if(mustContinue){
    if(selected&&selected.x===x&&selected.y===y) return;
    if(selected&&cell) doMove(selected.x,selected.y,x,y);
    return;
  }

  if(cell&&!cell.revealed&&!selected){
    cell.revealed=true; draw(); return;
  }

  if(cell&&!cell.revealed&&selected){
    let atk=board[selected.y][selected.x];
    if(isReachable(selected.x,selected.y,x,y,atk)){
      doMove(selected.x,selected.y,x,y); return;
    }
    selected=null; draw(); return;
  }

  if(!cell&&selected){
    let atk=board[selected.y][selected.x];
    if(isReachable(selected.x,selected.y,x,y,atk)){
      doMove(selected.x,selected.y,x,y);
    } else { selected=null; draw(); }
    return;
  }

  if(!selected){
    if(cell&&cell.revealed){ selected={x,y}; }
  } else {
    let atk=board[selected.y][selected.x];
    if(cell&&cell.revealed&&cell.side!==atk.side){
      doMove(selected.x,selected.y,x,y); return;
    }
    if(cell&&cell.revealed){ selected={x,y}; }
    else { selected=null; }
  }
  draw();
}

function isReachable(x1,y1,x2,y2,atk){
  let isCannon=(atk.type==="炮"||atk.type==="砲");
  let tgt=board[y2][x2];
  if(isCannon&&tgt) return checkCannon(x1,y1,x2,y2);
  return Math.abs(x2-x1)+Math.abs(y2-y1)===1;
}

function doMove(x1,y1,x2,y2){
  let atk=board[y1][x1], tgt=board[y2][x2];
  let isCannon=(atk.type==="炮"||atk.type==="砲");

  if(isCannon&&!tgt&&Math.abs(x2-x1)+Math.abs(y2-y1)!==1){ resetSel(); return; }
  if(isCannon&&tgt&&!checkCannon(x1,y1,x2,y2)){ resetSel(); return; }
  if(!isCannon&&tgt&&Math.abs(x2-x1)+Math.abs(y2-y1)!==1){ resetSel(); return; }

  if(!tgt){
    board[y2][x2]=atk; board[y1][x1]=null;
    mustContinue=false; selected=null;
    checkWin(); draw(); return;
  }

  if(!tgt.revealed){ handleUnrevealed(x1,y1,x2,y2,atk,tgt); return; }

  if(!canEat(atk,tgt,x1,y1,x2,y2)){ resetSel(); return; }
  finishCapture(x1,y1,x2,y2,atk,tgt,true);
}

function handleUnrevealed(x1,y1,x2,y2,atk,tgt){
  animating=true;
  tgt.revealed=true;
  draw();
  let el=document.getElementById(`c${x2}_${y2}`);
  if(el) el.classList.add("reveal-pop");

  setTimeout(()=>{
    let ok=canEat(atk,tgt,x1,y1,x2,y2);
    if(ok){
      finishCapture(x1,y1,x2,y2,atk,tgt,false);
    } else {
      let ael=document.getElementById(`c${x1}_${y1}`);
      if(ael) ael.classList.add("retreat-shake");
      mustContinue=false; selected=null;
      checkWin();
      setTimeout(()=>{ animating=false; draw(); },400);
    }
  },480);
}

function finishCapture(x1,y1,x2,y2,atk,tgt,doAnim){
  if(doAnim){
    animating=true;
    tgt.revealed=true; draw();
    let el=document.getElementById(`c${x2}_${y2}`);
    if(el) el.classList.add("reveal-pop");
    setTimeout(()=>{
      execCapture(x1,y1,x2,y2,atk,tgt);
      animating=false; draw();
    },480);
  } else {
    execCapture(x1,y1,x2,y2,atk,tgt);
    animating=false; draw();
  }
}

function execCapture(x1,y1,x2,y2,atk,tgt){
  if(atk.side==="R") redCaptures.push(tgt);
  else blackCaptures.push(tgt);
  board[y2][x2]=atk; board[y1][x1]=null;
  if(canEatAgain(x2,y2)){
    selected={x:x2,y:y2}; mustContinue=true;
  } else {
    mustContinue=false; selected=null;
  }
  checkWin();
}

function canEat(a,b,x1,y1,x2,y2){
  if(!b||a.side===b.side) return false;
  let isCannon=(a.type==="炮"||a.type==="砲");
  if(isCannon) return checkCannon(x1,y1,x2,y2);
  let rA=rankMap[a.type], rB=rankMap[b.type];
  if(rA===1&&rB===6) return true;
  if(rA===6&&rB===1) return false;
  if(rA===1&&(b.type==="炮"||b.type==="砲")) return false;
  return rA>=rB;
}

function canEatAgain(x,y){
  let a=board[y][x];
  let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  let isCannon=(a.type==="炮"||a.type==="砲");
  if(isCannon){
    for(let [dx,dy] of dirs){
      let nx=x+dx,ny=y+dy,jumped=false;
      while(nx>=0&&nx<W&&ny>=0&&ny<H){
        let t=board[ny][nx];
        if(t){
          if(!jumped) jumped=true;
          else { if(t.side!==a.side) return true; break; }
        }
        nx+=dx; ny+=dy;
      }
    }
    return false;
  }
  for(let [dx,dy] of dirs){
    let nx=x+dx,ny=y+dy;
    if(nx<0||nx>=W||ny<0||ny>=H) continue;
    let t=board[ny][nx];
    if(!t||t.side===a.side) continue;
    if(!t.revealed) return true;
    if(canEat(a,t,x,y,nx,ny)) return true;
  }
  return false;
}

function checkCannon(x1,y1,x2,y2){
  if(x1!==x2&&y1!==y2) return false;
  let count=0;
  if(x1===x2){
    let mn=Math.min(y1,y2),mx=Math.max(y1,y2);
    for(let y=mn+1;y<mx;y++) if(board[y][x1]) count++;
  } else {
    let mn=Math.min(x1,x2),mx=Math.max(x1,x2);
    for(let x=mn+1;x<mx;x++) if(board[y1][x]) count++;
  }
  return count===1;
}

function resetSel(){ selected=null; draw(); }

function checkWin(){
  let r=0,b=0;
  for(let row of board) for(let p of row) if(p){ if(p.side==="R") r++; else b++; }
  if(r===0||b===0){
    let wt=document.getElementById("winText");
    wt.innerText=r===0?"黑方勝！":"紅方勝！";
    wt.style.color=r===0?"#c0c0c0":"#e84040";
    document.getElementById("winOverlay").classList.add("show");
  }
}

initGame();
</script>

</body>
</html>
