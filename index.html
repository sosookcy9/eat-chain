<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>象棋連吃</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap');

:root {
  --bg:       #f5f0e8;
  --surface:  #faf7f2;
  --surface2: #ede8df;
  --border:   rgba(180,160,130,.25);
  --ink:      #2c2416;
  --ink2:     #8a7a65;
  --red:      #c0392b;
  --red2:     rgba(192,57,43,.1);
  --board:    #f0e9d8;
  --board2:   #e8dfc8;
  --shadow:   0 2px 16px rgba(60,40,10,.10);
  --shadow-lg:0 8px 40px rgba(60,40,10,.15);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:'Noto Serif TC',-apple-system,serif;
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── COVER ── */
#cover{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  padding:48px 32px;
  gap:0;
}
.cover-eyebrow{
  font-size:11px;letter-spacing:5px;
  color:var(--ink2);text-transform:uppercase;
  margin-bottom:20px;font-weight:600;
}
.cover-title{
  font-size:52px;font-weight:900;
  letter-spacing:-2px;line-height:1;
  color:var(--ink);margin-bottom:4px;
}
.cover-title em{color:var(--red);font-style:normal;}
.cover-rule{
  width:36px;height:2px;
  background:var(--red);opacity:.5;
  margin:28px auto;
}
.cover-desc{
  font-size:14px;color:var(--ink2);
  line-height:1.8;text-align:center;
  max-width:240px;margin-bottom:48px;
}
.cover-btn{
  padding:16px 52px;
  background:var(--ink);color:var(--surface);
  border:none;border-radius:100px;
  font-family:'Noto Serif TC',serif;
  font-size:16px;font-weight:700;letter-spacing:3px;
  cursor:pointer;
  box-shadow:0 4px 20px rgba(44,36,22,.25);
  transition:transform .12s,box-shadow .12s;
  -webkit-tap-highlight-color:transparent;
}
.cover-btn:active{transform:scale(.96);box-shadow:none;}

/* ── GAME ── */
#game{
  display:none;flex-direction:column;
  align-items:center;
  min-height:100vh;
  background:var(--bg);
}

.nav{
  width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:56px 24px 16px;
}
.nav-left,.nav-right{width:60px;}
.nav-btn{
  font-size:14px;font-weight:600;letter-spacing:1px;
  color:var(--ink2);background:none;border:none;
  cursor:pointer;padding:6px 0;
  -webkit-tap-highlight-color:transparent;
}
.nav-btn:disabled{opacity:.3;}
.nav-title{
  font-size:15px;font-weight:700;
  letter-spacing:3px;color:var(--ink);
}

/* game body */
.game-body{
  display:flex;flex-direction:row;
  align-items:flex-start;justify-content:center;
  gap:10px;
  padding:8px 0 40px;
  width:100%;
}

/* captured pieces columns */
.cap-col{
  width:32px;flex-shrink:0;
  display:flex;flex-direction:column;
  gap:6px;align-items:center;
  padding-top:8px;
}
.cap-piece{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;flex-shrink:0;
  letter-spacing:0;
}
.cap-piece.red{
  background:var(--surface);
  border:1.5px solid var(--red);
  color:var(--red);
  box-shadow:0 1px 4px rgba(192,57,43,.2);
}
.cap-piece.black{
  background:var(--ink);
  color:var(--surface);
  box-shadow:0 1px 4px rgba(44,36,22,.25);
}

/* board */
.board-wrap{
  flex:1;
  display:flex;justify-content:center;
}
.board-outer{
  background:var(--board);
  border-radius:20px;
  padding:8px;
  box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,.6);
  border:1px solid rgba(180,160,120,.3);
}
table{border-collapse:collapse;}
td{
  width:calc((100vw - 100px) / 4);
  height:calc((100vw - 100px) / 4);
  max-width:88px;max-height:88px;
  min-width:72px;min-height:72px;
  border:1px solid rgba(160,140,100,.2);
  text-align:center;vertical-align:middle;
  cursor:pointer;position:relative;
  background:var(--board);
  transition:background .1s;
  -webkit-tap-highlight-color:transparent;
}
td:active{background:transparent;}
td.selected{background:transparent;}

td::before,td::after{
  content:'';position:absolute;
  width:7px;height:7px;
  border-color:rgba(160,140,100,.3);border-style:solid;
  pointer-events:none;
}
td::before{top:4px;left:4px;border-width:1px 0 0 1px;}
td::after {bottom:4px;right:4px;border-width:0 1px 1px 0;}

/* pieces */
.piece{
  width:88%;height:88%;
  margin:auto;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px,7.5vw,42px);font-weight:900;
  user-select:none;position:relative;
  transition:transform .15s, box-shadow .15s;
  letter-spacing:0;
}
.piece.red{
  background:linear-gradient(145deg,#fff9f8 0%,#fce8e6 100%);
  border:2px solid var(--red);color:var(--red);
  box-shadow:
    0 3px 0 rgba(192,57,43,.2),
    0 4px 12px rgba(192,57,43,.15),
    inset 0 1px 0 rgba(255,255,255,.95);
}
.piece.black{
  background:linear-gradient(145deg,#ffffff 0%,#f0ece4 100%);
  border:2px solid #2c2416;color:#1e1912;
  box-shadow:
    0 3px 0 rgba(0,0,0,.2),
    0 4px 12px rgba(0,0,0,.15),
    inset 0 1px 0 rgba(255,255,255,.95);
}
.piece.back{
  background:linear-gradient(145deg,#d4c9b4 0%,#b8aa93 100%);
  border:2px solid #c4b89e;
  box-shadow:
    0 3px 0 rgba(0,0,0,.15),
    0 4px 10px rgba(0,0,0,.1),
    inset 0 1px 0 rgba(255,255,255,.4);
}
.piece.back::after{
  content:'';position:absolute;
  width:70%;height:70%;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.35);
}
.piece.empty{background:none;border:none;box-shadow:none;}

/* selected glow — white light ring for all pieces */
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 0 3px rgba(255,255,255,.9),0 0 16px 6px rgba(255,255,255,.7),0 0 32px 10px rgba(255,255,255,.4),inset 0 1px 0 rgba(255,255,255,.95);}
  50%{box-shadow:0 0 0 5px rgba(255,255,255,.95),0 0 24px 10px rgba(255,255,255,.8),0 0 48px 16px rgba(255,255,255,.5),inset 0 1px 0 rgba(255,255,255,.95);}
}
@keyframes glowPulseBlack{
  0%,100%{box-shadow:0 0 0 3px rgba(255,255,255,.9),0 0 16px 6px rgba(255,255,255,.7),0 0 32px 10px rgba(255,255,255,.4),inset 0 1px 0 rgba(255,255,255,.95);}
  50%{box-shadow:0 0 0 5px rgba(255,255,255,.95),0 0 24px 10px rgba(255,255,255,.8),0 0 48px 16px rgba(255,255,255,.5),inset 0 1px 0 rgba(255,255,255,.95);}
}
@keyframes glowPulseBack{
  0%,100%{box-shadow:0 0 0 3px rgba(255,255,255,.85),0 0 16px 6px rgba(255,255,255,.65),0 0 30px 10px rgba(255,255,255,.35);}
  50%{box-shadow:0 0 0 5px rgba(255,255,255,.9),0 0 24px 10px rgba(255,255,255,.75),0 0 44px 16px rgba(255,255,255,.45);}
}
td.selected .piece.red{
  transform:scale(1.08);
  animation:glowPulse 1.6s ease-in-out infinite;
}
td.selected .piece.black{
  transform:scale(1.08);
  animation:glowPulseBlack 1.6s ease-in-out infinite;
}
td.selected .piece.back{
  transform:scale(1.08);
  animation:glowPulseBack 1.6s ease-in-out infinite;
}

/* animations */
@keyframes revealPop{
  0%  {transform:scale(.3) rotate(-15deg);opacity:0;}
  65% {transform:scale(1.1) rotate(2deg);opacity:1;}
  100%{transform:scale(1) rotate(0);opacity:1;}
}
@keyframes retreatShake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}
  75%{transform:translateX(6px);}
}
.reveal-pop   {animation:revealPop .4s cubic-bezier(.34,1.56,.64,1) forwards;}
.retreat-shake{animation:retreatShake .3s ease;}

/* win overlay */
#winOverlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(44,36,22,.55);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  flex-direction:column;align-items:center;justify-content:center;
  padding:32px;
}
#winOverlay.show{display:flex;}
.win-card{
  background:var(--surface);
  border-radius:28px;
  padding:44px 32px 36px;
  width:100%;max-width:300px;
  text-align:center;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--border);
  animation:revealPop .4s cubic-bezier(.34,1.56,.64,1) forwards;
}
.win-eyebrow{
  font-size:11px;letter-spacing:4px;
  color:var(--ink2);text-transform:uppercase;
  font-weight:600;margin-bottom:16px;
}
#winText{
  font-size:68px;font-weight:900;
  letter-spacing:-2px;line-height:1;
  margin-bottom:36px;
}
.win-btns{display:flex;flex-direction:column;gap:10px;}
.win-btn{
  width:100%;padding:15px;
  border:none;border-radius:14px;
  font-family:'Noto Serif TC',serif;
  font-size:15px;font-weight:700;letter-spacing:2px;
  cursor:pointer;
  transition:transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.win-btn:active{transform:scale(.97);}
.win-btn.primary{background:var(--ink);color:var(--surface);}
.win-btn.secondary{background:var(--surface2);color:var(--ink2);}
</style>
</head>
<body>

<!-- COVER -->
<div id="cover">
  <div class="cover-eyebrow">二人對弈</div>
  <div class="cover-title">象棋<em>連吃</em></div>
  <div class="cover-rule"></div>

  <button class="cover-btn" onclick="startGame()">開局</button>
</div>

<!-- GAME -->
<div id="game">
  <div class="nav">
    <div class="nav-left">
      <button class="nav-btn" onclick="showCover()">返回</button>
    </div>
    <div class="nav-right" style="text-align:right">
      <button class="nav-btn" id="btnUndo" onclick="undoMove()" disabled>悔棋</button>
    </div>
  </div>
  <div class="game-body">
    <div class="cap-col" id="blackCaptures"></div>
    <div class="board-wrap">
      <div class="board-outer"><table id="board"></table></div>
    </div>
    <div class="cap-col" id="redCaptures"></div>
  </div>
</div>

<!-- WIN -->
<div id="winOverlay">
  <div class="win-card">
    <div class="win-eyebrow">對局結束</div>
    <div id="winText"></div>
    <div class="win-btns">
      <button class="win-btn primary" onclick="restartCurrent()">再來一局</button>
      <button class="win-btn secondary" onclick="showCover()">返回首頁</button>
    </div>
  </div>
</div>

<script>
const W=4, H=8;
const rankMap = {
  "帥":6,"將":6,"仕":5,"士":5,"相":4,"象":4,
  "俥":3,"車":3,"傌":2,"馬":2,"兵":1,"卒":1,"炮":0,"砲":0
};
const redTypes   = ["帥","仕","仕","相","相","傌","傌","俥","俥","炮","炮","兵","兵","兵","兵","兵"];
const blackTypes = ["將","士","士","象","象","馬","馬","車","車","砲","砲","卒","卒","卒","卒","卒"];

let board=[], selected=null, mustContinue=false, animating=false;
let redCaptures=[], blackCaptures=[];
let playerSide=null, gameMode='two', aiDiff=null;
let currentTurn='R', colorAssigned=false;
let history=[];

function showCover(){
  document.getElementById("cover").style.display="flex";
  document.getElementById("game").style.display="none";
  document.getElementById("winOverlay").classList.remove("show");
}
function startGame(){
  gameMode='two'; aiDiff=null;
  document.getElementById("cover").style.display="none";
  document.getElementById("game").style.display="flex";
  document.getElementById("winOverlay").classList.remove("show");
  initGame();
}
function restartCurrent(){
  document.getElementById("winOverlay").classList.remove("show");
  initGame();
}

function initGame(){
  board=[]; selected=null; animating=false; mustContinue=false;
  redCaptures=[]; blackCaptures=[];
  playerSide=null; currentTurn='R'; colorAssigned=false; history=[];
  let pieces=[
    ...redTypes.map(t=>({side:"R",type:t,revealed:false})),
    ...blackTypes.map(t=>({side:"B",type:t,revealed:false}))
  ].sort(()=>Math.random()-0.5);
  // Fisher-Yates shuffle for true randomness
  for(let i=pieces.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[pieces[i],pieces[j]]=[pieces[j],pieces[i]];}
  let idx=0;
  for(let y=0;y<H;y++){ board[y]=[]; for(let x=0;x<W;x++) board[y][x]=pieces[idx++]; }
  updateUndo(); draw();
}

function saveHistory(){
  history.push({
    board: board.map(r=>r.map(p=>p?{...p}:null)),
    selected: selected?{...selected}:null,
    mustContinue, currentTurn, colorAssigned, playerSide,
    redCaptures: redCaptures.map(p=>({...p})),
    blackCaptures: blackCaptures.map(p=>({...p}))
  });
  updateUndo();
}
function undoMove(){
  if(!history.length||animating) return;
  let h=history.pop();
  board=h.board.map(r=>r.map(p=>p?{...p}:null));
  selected=h.selected?{...h.selected}:null;
  mustContinue=h.mustContinue; currentTurn=h.currentTurn;
  colorAssigned=h.colorAssigned; playerSide=h.playerSide;
  redCaptures=h.redCaptures.map(p=>({...p}));
  blackCaptures=h.blackCaptures.map(p=>({...p}));
  updateUndo(); draw();
}
function updateUndo(){ document.getElementById("btnUndo").disabled=!history.length; }

function draw(){
  let html="";
  for(let y=0;y<H;y++){
    html+="<tr>";
    for(let x=0;x<W;x++){
      let p=board[y][x], text="", cls="piece";
      if(p){
        if(p.revealed){ text=p.type; cls+=" "+(p.side==="R"?"red":"black"); }
        else cls+=" back";
      } else cls+=" empty";
      let isSel=selected&&selected.x===x&&selected.y===y;
      html+=`<td onclick="clickCell(${x},${y})" class="${isSel?"selected":""}">
        <div class="${cls}" id="c${x}_${y}">${text}</div></td>`;
    }
    html+="</tr>";
  }
  document.getElementById("board").innerHTML=html;
  let bSorted=[...blackCaptures].sort((a,b)=>rankMap[b.type]-rankMap[a.type]);
  let rSorted=[...redCaptures].sort((a,b)=>rankMap[b.type]-rankMap[a.type]);
  document.getElementById("blackCaptures").innerHTML=bSorted.map(p=>`<div class="cap-piece black">${p.type}</div>`).join('');
  document.getElementById("redCaptures").innerHTML=rSorted.map(p=>`<div class="cap-piece red">${p.type}</div>`).join('');
}

function clickCell(x,y){
  if(animating) return;
  let cell=board[y][x];
  if(cell&&!cell.revealed&&!selected){
    saveHistory(); cell.revealed=true; draw(); return;
  }
  if(selected){
    let atk=board[selected.y][selected.x];
    if(selected.x===x&&selected.y===y){ selected=null; draw(); return; }
    if(atk&&isReachable(selected.x,selected.y,x,y,atk)){ doMove(selected.x,selected.y,x,y); return; }
    if(cell&&cell.revealed){ selected={x,y}; draw(); return; }
    selected=null; draw(); return;
  }
  if(cell&&cell.revealed){ selected={x,y}; draw(); }
}

function isReachable(x1,y1,x2,y2,atk){
  let isCannon=(atk.type==="炮"||atk.type==="砲");
  let tgt=board[y2][x2];
  if(isCannon&&tgt) return checkCannon(x1,y1,x2,y2);
  return Math.abs(x2-x1)+Math.abs(y2-y1)===1;
}

function doMove(x1,y1,x2,y2){
  let atk=board[y1][x1], tgt=board[y2][x2];
  if(!atk) return;
  let isCannon=(atk.type==="炮"||atk.type==="砲");
  if(isCannon&&!tgt&&Math.abs(x2-x1)+Math.abs(y2-y1)!==1){ selected=null; draw(); return; }
  if(isCannon&&tgt&&!checkCannon(x1,y1,x2,y2)){ selected=null; draw(); return; }
  if(!isCannon&&Math.abs(x2-x1)+Math.abs(y2-y1)!==1){ selected=null; draw(); return; }
  saveHistory();
  if(!tgt){
    board[y2][x2]=atk; board[y1][x1]=null; selected=null;
    checkWin(); draw(); return;
  }
  if(!tgt.revealed){ handleUnrevealed(x1,y1,x2,y2,atk,tgt); return; }
  if(!canEat(atk,tgt,x1,y1,x2,y2)){ selected=null; draw(); return; }
  finishCapture(x1,y1,x2,y2,atk,tgt,true);
}

function handleUnrevealed(x1,y1,x2,y2,atk,tgt){
  animating=true; tgt.revealed=true; draw();
  let el=document.getElementById(`c${x2}_${y2}`);
  if(el) el.classList.add("reveal-pop");
  setTimeout(()=>{
    if(canEat(atk,tgt,x1,y1,x2,y2)){
      finishCapture(x1,y1,x2,y2,atk,tgt,false);
    } else {
      let ael=document.getElementById(`c${x1}_${y1}`);
      if(ael) ael.classList.add("retreat-shake");
      selected=null;
      checkWin();
      setTimeout(()=>{ animating=false; draw(); },350);
    }
  },460);
}

function finishCapture(x1,y1,x2,y2,atk,tgt,doAnim){
  function afterCapture(){
    if(atk.side==="R") redCaptures.push(tgt);
    else blackCaptures.push(tgt);
    board[y2][x2]=atk; board[y1][x1]=null;
    selected={x:x2,y:y2};
    animating=false;
    checkWin(); draw();
  }
  if(doAnim){
    animating=true; tgt.revealed=true; draw();
    let el=document.getElementById(`c${x2}_${y2}`);
    if(el) el.classList.add("reveal-pop");
    setTimeout(afterCapture,460);
  } else { afterCapture(); }
}

function canEat(a,b,x1,y1,x2,y2){
  if(!b||a.side===b.side) return false;
  if(a.type==="炮"||a.type==="砲") return checkCannon(x1,y1,x2,y2);
  let rA=rankMap[a.type],rB=rankMap[b.type];
  if(rA===1&&rB===6) return true;
  if(rA===6&&rB===1) return false;
  if(rA===1&&(b.type==="炮"||b.type==="砲")) return false;
  return rA>=rB;
}

function checkCannon(x1,y1,x2,y2){
  if(x1!==x2&&y1!==y2) return false;
  let count=0;
  if(x1===x2){ let mn=Math.min(y1,y2),mx=Math.max(y1,y2); for(let y=mn+1;y<mx;y++) if(board[y][x1]) count++; }
  else { let mn=Math.min(x1,x2),mx=Math.max(x1,x2); for(let x=mn+1;x<mx;x++) if(board[y1][x]) count++; }
  return count===1;
}

function checkWin(){
  let r=0,b=0;
  for(let row of board) for(let p of row) if(p){ if(p.side==="R") r++; else b++; }
  if(r===0||b===0){
    let wt=document.getElementById("winText");
    wt.innerText=r===0?"黑勝":"紅勝";
    wt.style.color=r===0?"#2c2416":"#c0392b";
    document.getElementById("winOverlay").classList.add("show");
  }
}

showCover();
</script>
</body>
</html>
